services:
  annotation-frontend:
    image: ${ANNOTATION_FRONTEND_IMAGE:-sop-annotation-frontend:latest}
    container_name: sop-annotation-frontend
    ports:
      - "${SERVICE_PORT:-80}:${SERVICE_PORT:-80}"
    environment:
      - NODE_ENV=production
    networks:
      - sop-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sop-network:
    driver: bridge
