server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Allow large file upload (maximum 2GB)
    client_max_body_size 2048M;

    # Increase timeout settings for large file uploads
    client_body_timeout 1200s;
    client_header_timeout 1200s;
    proxy_connect_timeout 1200s;
    proxy_send_timeout 1200s;
    proxy_read_timeout 1200s;

    # Optimize large file upload handling
    client_body_buffer_size 128k;
    client_body_temp_path /tmp/nginx_upload_temp;
    proxy_request_buffering off;  # Stream uploads directly to backend

    # Handle React Router single page application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static resource cache settings
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy settings (optional, if you need to solve CORS issues)
    location /api/annotation/ {
        proxy_pass http://${ANNOTATION_BACKEND_HOST}:${ANNOTATION_BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Set file size limit for API proxy
        client_max_body_size 2048M;
    }

    # Data augmentation API proxy
    location /api/augmentation/ {
        proxy_pass http://${AUGMENTATION_BACKEND_HOST}:${AUGMENTATION_BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Set file size limit for API proxy
        client_max_body_size 2048M;
    }

    # VLM training API proxy
    location /api/vlm-training/ {
        proxy_pass http://${VLM_TRAINING_BACKEND_HOST}:${VLM_TRAINING_BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # DDM training API proxy
    location /api/ddm-training/ {
        proxy_pass http://${DDM_TRAINING_BACKEND_HOST}:${DDM_TRAINING_BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Evaluation API proxy
    location /api/evaluation/ {
        proxy_pass http://${EVAL_BACKEND_HOST}:${EVAL_BACKEND_PORT}/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security header settings
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Content-Security-Policy: defense-in-depth for the SPA (XSS is already not
    # reachable via JSX auto-escaping). 'unsafe-inline' is required for the CRA
    # runtime/styles; tighten script-src to hashes/nonces if the build allows.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
}