redis = "12800"

[train]
resume = true
epoch = 1
output_dir = "OUTPUT_PATH_PLACEHOLDER"
epsilon = 1e-6
optm_name = "AdamW"
optm_impl = ["fused", "fused", "fused"]
optm_weight_decay = 0.01
optm_betas = [ 0.9, 0.999,]
optm_warmup_steps = 20
optm_lr = [1.5e-05, 1.5e-05, 1.5e-05]
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 4
sync_weight_interval = 1

[validation]
enable = false
freq = 1000
batch_size = 1

[policy]
model_name_or_path = "./assets/weights/Cosmos-Reason2-2B"
model_max_length = 81920
model_gradient_checkpointing = true

[logging]
logger = ['console', 'wandb']
project_name = "cosmos_reason_sop"
experiment_name = "EXPERIMENT_NAME_PLACEHOLDER"

[train.train_policy]
type = "sft"
mini_batch = 1
dataloader_num_workers = 4
dataloader_prefetch_factor = 4
conversation_column_name = "conversations"
dataloader_shuffle = true
enable_dataset_cache = false

[train.train_policy.dataset]
name = "DATASET_PLACEHOLDER"
subset = "NOUSED"
split = "SPLIT_PLACEHOLDER"
test_size = 0.1

[train.ckpt]
enable_checkpoint = true
save_freq = 200
max_keep = 1
save_mode = "async"

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 8
pp_size = 1
dp_replicate_size = 1

[custom.vision]
fps=8
max_frames=40
total_pixels=16572416 # 32 * 32 * 8092 * 2, 16k vision token

[custom]
system_prompt = "Answer the questions."