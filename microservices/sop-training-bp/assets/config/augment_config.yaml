# General Config
video_extention: "mp4"


# BCQ Config
bcq:
  enable: true
  negative_ratio: 2.0 # ratio of negative samples to positive samples
  subject: "operator" # who take the action
  exclude_action: "" # actions to exclude from BCQ generation


# Sequential MCQ Config
sequential_mcq:
  enable: true
  exclude_action: "" # actions to exclude from sequential MCQ generation
  max_chunk_len: 2  # maximum number of actions in a chunk


# Golden GQA to GQA Config
golden_gqa:
  enable: true


# GQA to GQAs Config
gqas:
  enable: true
  llm_type: "nvidia" # LLM type, local or nvidia
  local_llm_url: "" # Local LLM URL. Validated for SSRF: private/loopback hosts are allowed when llm_type=="local" (or ALLOW_PRIVATE_LLM_URL=true); link-local/metadata (169.254.0.0/16) is always blocked.
  llm: meta/llama-3.1-70b-instruct # NVIDIA NIM API LLM Model, default is "meta/llama-3.1-70b-instruct"
  num_qa_llm: 8 # Number of QA pairs to be generated by LLM
  num_qa_per_chunk: 2
  exclude_action: "" # actions to exclude from GQA to GQAs generation


# Dynamic MCQ Config
# recommend trying 1p2n / 2p2n (positive samples: 1 or 2, negative samples: 2) first
dynamic_mcq:
  enable: false
  exclude_action: "" # actions to exclude from Dynamic MCQ generation
  non_sop_action: 17 # action index of non-SOP action (This must be set)
  min_options: 3 # minimum number of options (adjust according to the number of actions)
  max_options: 6 # maximum number of options (adjust according to the number of actions)
  num_pos: 1 # number of positive samples
  num_neg: 2 # number of negative samples


# Dynamic Shuffling Config
# recommend trying num_runs = 1 or 2 first
dynamic_shuffling:
  enable: false
  exclude_action: "" # actions to exclude from Dynamic Shuffling generation
  non_sop_action: 17 # action index of non-SOP action (This must be set)
  min_distractor: 3 # minimum number of distractor videos
  max_distractor: 6 # maximum number of distractor videos
  num_runs: 1 # number of runs for dynamic shuffling


# Extra Negative Config
extra_negative:
  enable: false
  exclude_action: "" # actions to exclude from Extra Negative generation (This is for other labeled data)
  extra_negative_data_id: "<other labeled data id>" # id of the other labeled data to be used as extra negative data (This must be set)
  non_sop_action: 17 # action index of non-SOP action (This must be set)
  min_options: 3 # minimum number of options (adjust according to the number of actions)
  max_options: 6 # maximum number of options (adjust according to the number of actions)
  num_runs: 1 # number of runs for extra negative
  generate_all_options: true # generate all options for extra negative


# Small Chunk Merge Config (multi-operator mode only)
# Merges chunks whose duration < threshold of adjacent neighbor
# Runs after video split, before augmentation
merge_small_chunks:
  enable: true
  threshold: 0.20  # 20% -- chunk is "small" if < 20% of neighbor duration

# Spatial Localization Config
# Originally designed for multi-operator mode; also applicable to single-operator
# mode if desired. Defaults to false — set to true to opt in.
spatial_localization:
  enable: false
  max_qa_per_group: 3
  max_question_tokens: 60
  exclude_action: ""

# Frame Drop Config
# Originally designed for multi-operator mode; also applicable to single-operator
# mode if desired. Defaults to false — set to true to opt in.
frame_drop:
  enable: false
  dropout_rate: 0.2
  iterations: 1
  seed: 42
  target_stages: "all"  # "all" = all completed stages, or list e.g. ["bcq", "gqas"]
