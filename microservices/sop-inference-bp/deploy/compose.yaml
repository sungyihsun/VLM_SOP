#### start server ####
# docker compose -f deploy/compose.yaml up -d
# docker attach deploy-nvds-action-sop-1
#### end server ####
services:
  nvds-action-sop:
    image: ${NV_DS_SOP_IMAGE:-nvds-sop:1.0.0}
    build:
      context: ..
      dockerfile: docker/Docker.build
      args:
        # Set to 1 to accept the Basler Pylon SDK license terms and let the build
        # auto-download the (commercial) SDK from the Basler CDN when it is not
        # present in ./binaries/. Defaults to 0: the build fails with instructions.
        ALLOW_PYLON_CDN_DOWNLOAD: "${ALLOW_PYLON_CDN_DOWNLOAD:-0}"
    # Use user: "0:0: to debug
    user: "${USER_ID:-1001}:${GROUP_ID:-1001}"
    shm_size: '16gb'
    runtime: nvidia
    ports:
      - "${API_SERVER_PORT:-8300}:${API_SERVER_PORT:-8300}"

    volumes:
      - "${HOST_CACHE:-$HOME/.cache/ds_sop}:/opt/nvidia/nvds_sop/.cache"
      - "${HOST_CACHE:-$HOME/.cache/ds_sop}:/root/.cache"
      - "${MODEL_ROOT_DIR:-/models}:${MODEL_ROOT_DIR:-/models}"
      - "${MEDIA_STORAGE_DIR:-/tmp/dummy}${MEDIA_STORAGE_DIR:+:/tmp/nvds_sop_storage}"
      - "${ENCODE_VIDEO_OUTPUT_DIR:-/tmp/dummy}${ENCODE_VIDEO_OUTPUT_DIR:+:/opt/nvidia/nvds_sop/chunks}"
      - "${ALERT_SOUND_FILE:-/tmp/dummy}${ALERT_SOUND_FILE:+:/opt/nvidia/nvds_sop/stream/alert.wav}"
      - "${ACTION_CONFIG_PATH:-/tmp/dummy}${ACTION_CONFIG_PATH:+:$ACTION_CONFIG_PATH}"
      - "${VLM_PROMPT_PATH:-/tmp/dummy}${VLM_PROMPT_PATH:+:$VLM_PROMPT_PATH}"
      - "${NVIDIA_DRIVER_LIB_DIR:-/tmp/dummy}${NVIDIA_DRIVER_LIB_DIR:+:/host-nvidia:ro}"
      - "/home/spark/eason/sop-monitoring-blueprints/microservices/sop-inference-bp/nvds_action_detector/api_server.py:/opt/nvidia/nvds_sop/nvds_action_detector/api_server.py:ro"
      - "/home/spark/eason/sop-monitoring-blueprints/microservices/sop-inference-bp/nvds_action_detector/ds_sop_process.py:/opt/nvidia/nvds_sop/nvds_action_detector/ds_sop_process.py:ro"
      - "/home/spark/eason/sop-monitoring-blueprints/microservices/sop-inference-bp/nvds_action_detector/vllm_inference.py:/opt/nvidia/nvds_sop/nvds_action_detector/vllm_inference.py:ro"
      - "/home/spark/eason/sop-monitoring-blueprints/microservices/sop-inference-bp/nvds_action_detector/static:/opt/nvidia/nvds_sop/nvds_action_detector/static:ro"
      - "/dev:/dev"
      - "${CAMERA_EMULATION_DIR:-/tmp/dummy}${CAMERA_EMULATION_DIR:+:/opt/nvidia/nvds_sop/streams/simulation}"
      - ${XDG_RUNTIME_DIR}/pulse:/run/pulse

    environment:
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-0}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-all}"
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      API_SERVER_PORT: ${API_SERVER_PORT:-8300}
      API_DUMMY_TEST: "${API_DUMMY_TEST:-false}"
      NGC_API_KEY: ${NGC_API_KEY:-}
      INSTALL_PROPRIETARY_CODECS: "${INSTALL_PROPRIETARY_CODECS:-true}"
      DDM_MODEL_PATH: "${DDM_MODEL_PATH:-/models/gbed_models/ddm/checkpoint.pth.tar}"
      DDM_TRT_OPTIMIZATION: "${DDM_TRT_OPTIMIZATION:-false}"
      DDM_TRT_ENGINE_OUTPUT_PATH: "${DDM_TRT_ENGINE_OUTPUT_PATH:-/tmp/trt_opt/ddm.engine}"
      DDM_TRT_PRECISION: "${DDM_TRT_PRECISION:-fp32}"
      DDM_TRT_BUILD_WORKSPACE_GB: "${DDM_TRT_BUILD_WORKSPACE_GB:-4}"
      # Required: no usable default. Set to a fine-tuned VLM checkpoint dir under
      # MODEL_ROOT_DIR, or a Hugging Face repo id. Startup fails fast if empty.
      VLLM_MODEL_PATH: "${VLLM_MODEL_PATH:-}"
      USE_VLLM_INFERENCE: "${USE_VLLM_INFERENCE:-true}"
      CAMERA_FORMAT: "${CAMERA_FORMAT:-RGB}"
      CAMERA_FPS_NUM: "${CAMERA_FPS_NUM:-}"
      CAMERA_FPS_DEN: "${CAMERA_FPS_DEN:-}"
      CAMERA_WIDTH: "${CAMERA_WIDTH:-}"
      CAMERA_HEIGHT: "${CAMERA_HEIGHT:-}"
      CAMERA_NUM_BUFFERS: "${CAMERA_NUM_BUFFERS:-}"
      PYLON_CAMEMU: "${PYLON_CAMEMU:-1}"
      CAMERA_EMULATION_DIR: "${CAMERA_EMULATION_DIR:-}"
      #VLM_INFERENCE_ENDPOINT: "${VLM_INFERENCE_ENDPOINT:-http://localhost:8000}"
      ENABLE_ALERT_SOUND: "${ENABLE_ALERT_SOUND:-false}"
      ALERT_SOUND_FILE: "/opt/nvidia/nvds_sop/stream/alert.wav"
      ENABLE_MESSAGING: "${ENABLE_MESSAGING:-false}"
      ENCODE_VIDEO: "${ENCODE_VIDEO:-false}"
      # NOTE: localhost:9092 targets the bundled single-host kafka service below.
      # For an external/distributed broker, set KAFKA_BROKER in deploy/.env.
      KAFKA_BROKER: "${KAFKA_BROKER:-localhost:9092}"
      SOP_MESSAGING_SCHEMA: "${SOP_MESSAGING_SCHEMA:-JSON}"
      DEFAULT_TOPIC: "${DEFAULT_TOPIC:-mdx-vlm-captions}"
      PULSE_SERVER: "unix:/run/pulse/native"
      PYTHONPATH: "${PYTHONPATH:-/opt/nvidia/nvds_sop}"
      LD_LIBRARY_PATH: "/host-nvidia:/usr/lib/aarch64-linux-gnu:/lib/aarch64-linux-gnu:/usr/lib/aarch64-linux-gnu/tegra:/opt/nvidia/deepstream/deepstream-8.0/lib:/opt/nvidia/via/lib:${LD_LIBRARY_PATH:-/opt/tritonserver/lib/}"
      ACTION_CONFIG_PATH: "${ACTION_CONFIG_PATH:-/opt/nvidia/nvds_sop/configs/actions.json}"
      VLM_PROMPT_PATH: "${VLM_PROMPT_PATH:-/opt/nvidia/nvds_sop/configs/vlm_prompts.txt}"
      DS_ACTION_IN_RESOLUTION: "${DS_ACTION_IN_RESOLUTION:-224}"
      DS_ACTION_IN_RESIZE_METHOD: "${DS_ACTION_IN_RESIZE_METHOD:-nearest}"
      FRAMES_PER_SIDE: "${FRAMES_PER_SIDE:-5}"
      SEQUENCE_BATCH: "${SEQUENCE_BATCH:-8}"
      BOUNDARY_DELAY_FRAME: "${BOUNDARY_DELAY_FRAME:-8}"
      VLLM_GPU_MEMORY_UTILIZATION: "${VLLM_GPU_MEMORY_UTILIZATION:-0.3}"
      VLLM_MAX_MODEL_LEN: "${VLLM_MAX_MODEL_LEN:-20480}"
      VLLM_MAX_NUM_SEQS: "${VLLM_MAX_NUM_SEQS:-16}"
      # Model switching happens after CUDA has already been initialized. Forked
      # workers cannot safely reinitialize CUDA, so vLLM workers must use spawn.
      VLLM_WORKER_MULTIPROC_METHOD: "${VLLM_WORKER_MULTIPROC_METHOD:-spawn}"
      TOKENIZERS_PARALLELISM: "${TOKENIZERS_PARALLELISM:-false}"
      VLM_MAX_TOKENS: "${VLM_MAX_TOKENS:-256}"
      VLM_TEMPERATURE: "${VLM_TEMPERATURE:-0.2}"
      VLM_MAX_PIXELS: "${VLM_MAX_PIXELS:-0}"
      VLM_MAX_FRAMES: "${VLM_MAX_FRAMES:-0}"
      VLM_RESIZED_HEIGHT: "${VLM_RESIZED_HEIGHT:-0}"
      VLM_RESIZED_WIDTH: "${VLM_RESIZED_WIDTH:-0}"
      VLM_MAX_TOTAL_PIXELS: "${VLM_MAX_TOTAL_PIXELS:-0}"
      VLM_FPS: "${VLM_FPS:-8.0}"
      SW_ENCODER: "${SW_ENCODER:-true}"
      # RTSP streaming output (only effective if the microservice was built with
      # the optional RTSP feature). Disabled by default.
      ENABLE_RTSP_OUTPUT: "${ENABLE_RTSP_OUTPUT:-false}"
      RTSP_PORT: "${RTSP_PORT:-8554}"
      RTSP_PREVIEW_ALLOWED_HOSTS: "${RTSP_PREVIEW_ALLOWED_HOSTS:-}"
      RTSP_PREVIEW_MAX_PROCESSES: "${RTSP_PREVIEW_MAX_PROCESSES:-2}"
      RTSP_PREVIEW_FPS: "${RTSP_PREVIEW_FPS:-6}"
      RTSP_PREVIEW_WIDTH: "${RTSP_PREVIEW_WIDTH:-640}"
      LOCAL_VIDEO_PREVIEW_ALLOWED_ROOTS: "${LOCAL_VIDEO_PREVIEW_ALLOWED_ROOTS:-/tmp/nvds_sop_storage}"
      LOCAL_VIDEO_PREVIEW_ALLOWED_PATHS: "${LOCAL_VIDEO_PREVIEW_ALLOWED_PATHS:-}"
      LOCAL_VIDEO_DIR: "${LOCAL_VIDEO_DIR:-}"
      AVAILABLE_MODELS: "${AVAILABLE_MODELS:-}"


    working_dir: "${WORK_DIR_PATH:-/opt/nvidia/nvds_sop}"
    entrypoint: "${ENTRYPOINT:-./start_server.sh}"
    network_mode: "${NETWORK_MODE:-host}"
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    depends_on:
      kafka:
        condition: service_started
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
    ipc: host
    stdin_open: true
    tty: true

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_NUM_PARTITIONS=3
    ports:
      - "9092:9092"
