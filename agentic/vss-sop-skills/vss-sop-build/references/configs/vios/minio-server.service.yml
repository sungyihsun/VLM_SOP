# Step 7 — `sop/vst/minio/minio-compose.yaml` (NEW).
# Object store for VST clip exports. All ports/credentials are sourced
# from the SOP `.env` (Step 4e).
services:
  minio-server:
    image: ${MINIO_IMAGE}
    user: "0:0"
    volumes:
      - ${MINIO_DATA_PATH}:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_API_DELETE_CLEANUP_INTERVAL=${MINIO_API_DELETE_CLEANUP_INTERVAL}
      - MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL=${MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL}
      - MINIO_API_STALE_UPLOADS_EXPIRY=${MINIO_API_STALE_UPLOADS_EXPIRY}
      - MINIO_BIND_IP=${MINIO_BIND_IP}
    network_mode: host
    container_name: minio-server
    restart: unless-stopped
    command: server /data --address "${MINIO_BIND_IP}:${MINIO_API_PORT}" --console-address "${MINIO_BIND_IP}:${MINIO_CONSOLE_PORT}"
    profiles: [minio]
    healthcheck:
      test: ["CMD","curl","-f","http://${MINIO_BIND_IP}:${MINIO_API_PORT}/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
