# sop/vst/docker-compose.yaml — full SOP VST compose (Steps 3a-3f of vios-building.md).
# Single source of truth: modify_vios_for_sop.py copies this file verbatim to
# deployments/vst/sop/vst/docker-compose.yaml. Edit here, not in the script.
include:
  - path: $MDX_SAMPLE_APPS_DIR/vst/sop/vst/sdr-rtspserver-http/sdr-compose.yaml
  - path: $MDX_SAMPLE_APPS_DIR/vst/sop/vst/sdr-recorder-http/sdr-compose.yaml
  - path: $MDX_SAMPLE_APPS_DIR/vst/sop/vst/sdr-replaystream-http/sdr-compose.yaml
  - path: $MDX_SAMPLE_APPS_DIR/vst/sop/vst/sdr-livestream-http/sdr-compose.yaml
  - path: $MDX_SAMPLE_APPS_DIR/vst/sop/vst/minio/minio-compose.yaml

services:
  sensor-ms-sop:
    image: ${VST_SENSOR_IMAGE}
    profiles: ["bp_sop_2d"]
    user: "0:0"
    runtime: nvidia
    entrypoint: ["/bin/bash", "-c", "exec /home/vst/vst_release/launch_vst"]
    environment:
      - ADAPTOR=vst_rtsp
      - NEED_RECORDING=false
      - NEED_RTSPSERVER=false
      - NEED_STORAGE=false
      - NEED_STREAM_MONITORING=true
      - HTTP_PORT=${SENSOR_HTTP_PORT}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - RTSP_SERVER_MODULE_ENDPOINT=${RTSP_SERVER_MODULE_ENDPOINT}
      - RECORDER_MODULE_ENDPOINT=${RECORDER_MODULE_ENDPOINT}
      - STORAGE_MODULE_ENDPOINT=${STORAGE_MODULE_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH}:/home/vst/vst_release/configs
      - ${VST_CONFIG_PATH}/vst_config_${STREAM_TYPE:-redis}.json:/home/vst/vst_release/configs/vst_config.json
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
    network_mode: host
    container_name: sensor-ms-sop
    restart: on-failure
    depends_on:
      redis:
        condition: service_started
      vst-ingress-sop:
        condition: service_started
      centralizedb-sop:
        condition: service_started
      rtspserver-ms-1-sop:
        condition: service_started
      sdr-http-rtspserver-sop:
        condition: service_started
      recorder-ms-1-sop:
        condition: service_started
      sdr-http-recorder-sop:
        condition: service_started
      replaystream-ms-1-sop:
        condition: service_started
      sdr-http-replaystream-sop:
        condition: service_started
      livestream-ms-1-sop:
        condition: service_started
      sdr-http-livestream-sop:
        condition: service_started

  centralizedb-sop:
    image: ${POSTGRES_IMAGE}
    profiles: ["bp_sop_2d"]
    user: "0:0"
    environment:
      - POSTGRES_USER=${CENTRALIZE_DB_USERNAME}
      - POSTGRES_DB=${CENTRALIZE_DB_NAME}
      - POSTGRES_HOST_AUTH_METHOD=trust
      - VST_INGRESS_ENDPOINT=${VST_INGRESS_ENDPOINT}
    volumes:
      - ${VST_VOLUME}/postgres/db:/var/lib/postgresql/data
      - ${VST_CONFIG_PATH}/postgresql.conf:/etc/postgresql/postgresql.conf
      - ${VST_DATA_PATH}:/var/run/postgresql
    network_mode: host
    container_name: centralizedb-sop
    restart: always
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
      - "-c"
      - "unix_socket_directories=/var/run/postgresql"

  vst-ingress-sop:
    image: ${NGINX_IMAGE}
    profiles: ["bp_sop_2d"]
    user: "0:0"
    volumes:
      - ${VST_CONFIG_PATH}/nginx.conf:/etc/nginx/nginx.conf
      - ${VST_LOGS}/nginx_logs:/var/log/nginx
    network_mode: host
    container_name: vst-ingress-sop
    restart: always
    command:
      - /bin/sh
      - -c
      - |
        exec nginx -g 'daemon off;'

  storage-ms-sop:
    image: ${VST_STORAGE_IMAGE}
    profiles: ["bp_sop_2d"]
    user: "0:0"
    runtime: nvidia
    entrypoint: ["/bin/bash","-c","if [ \"$VST_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
    environment:
      - VST_INSTALL_ADDITIONAL_PACKAGES=${VST_INSTALL_ADDITIONAL_PACKAGES}
      - NVIDIA_VISIBLE_DEVICES=all
      - ADAPTOR=storage
      - NEED_RECORDING=false
      - NEED_RTSPSERVER=false
      - NEED_STORAGE=true
      - NEED_STREAM_MONITORING=false
      - HTTP_PORT=${STORAGE_HTTP_PORT}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - VST_INGRESS_ENDPOINT=${VST_INGRESS_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH}:/home/vst/vst_release/configs
      - ${VST_CONFIG_PATH}/vst_config_${STREAM_TYPE:-redis}.json:/home/vst/vst_release/configs/vst_config.json
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
      - ${CLIP_STORAGE_PATH}:/home/vst/vst_release/streamer_videos
      - ${VST_TEMP_FILES_PATH}:/home/vst/vst_release/webroot/temp_files
    network_mode: host
    container_name: storage-ms-sop
    restart: on-failure
    depends_on:
      redis: { condition: service_started }
      vst-ingress-sop: { condition: service_started }
      centralizedb-sop: { condition: service_started }

  vst-mcp-sop:
    image: ${VST_MCP_IMAGE}
    profiles: ["bp_sop_2d"]
    user: "0:0"
    environment:
      - MCP_GATEWAY_CPP_API_BASE_URL=${MCP_GATEWAY_CPP_API_BASE_URL}
      - MCP_GATEWAY_CPP_API_TIMEOUT=${MCP_GATEWAY_CPP_API_TIMEOUT}
      - MCP_GATEWAY_SERVER_NAME=${MCP_GATEWAY_SERVER_NAME}
      - MCP_GATEWAY_SERVER_VERSION=${MCP_GATEWAY_SERVER_VERSION}
      - MCP_GATEWAY_SERVER_HOST=${MCP_GATEWAY_SERVER_HOST}
      - MCP_GATEWAY_SERVER_PORT=${MCP_GATEWAY_SERVER_PORT}
      - MCP_GATEWAY_LOG_LEVEL=${MCP_GATEWAY_LOG_LEVEL}
      - MCP_GATEWAY_ENABLE_JSONRPC_LOGGING=${MCP_GATEWAY_ENABLE_JSONRPC_LOGGING}
    network_mode: host
    container_name: vst-mcp-sop
    restart: always
    depends_on:
      sensor-ms-sop:
        condition: service_started
      vst-ingress-sop:
        condition: service_started
      centralizedb-sop:
        condition: service_started
