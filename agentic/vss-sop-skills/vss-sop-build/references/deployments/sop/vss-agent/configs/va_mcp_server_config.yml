functions:
  vst_sensor_list:
    _type: vst.sensor_list
    # INTERNAL: vss-va-mcp → VST on the same host (network_mode: host)
    vst_internal_url: http://localhost:30888

function_groups:
  video_analytics:
    _type: video_analytics
    # INTERNAL: vss-va-mcp → ElasticSearch on the same host
    es_url: "http://localhost:${VSS_ES_PORT}"
    index_prefix: "mdx-"
    vlm_verified: false
    vst_sensor_list_tool: vst_sensor_list
    embedding_model_name: "sentence-transformers/all-MiniLM-L6-v2"
    include:
    - get_sensor_ids
    - get_places
    - get_sop_status
    - get_sop_report
    - get_sop_as_incidents
    - get_sop_as_incident

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024


# dummy workflow required to start MCP server
workflow:
  _type: react_agent
  tool_names: [video_analytics]
  llm_name: nim_llm
  verbose: true
  parse_agent_response_max_retries: 3
