######################################################################
# By-Action Evaluation Inputs Template (API-driven)
# Used by the orchestrator (Step 7a) to generate
# inputs_by_action_iter<N>.yaml each iteration. Fill in placeholders
# from run_state.yaml. Submitted to the BP evaluation-ms HTTP API via
# the /sop-by-action-eval skill — no Docker mount or sop-inference-bp path.
#
# Placeholder reference (all from run_state.yaml):
#   <training_job_id>     → run_state.training_job_id
#   <val_dataset_id>      → run_state.val_dataset_id
#   <host_results_root>   → run_state.host_results_root (host path mapped
#                           to /workspace/sop-eval-ms/assets/results inside
#                           the eval-ms container)
#   <fps>                 → from train_config.toml [custom.vision].fps
#                           (MUST match training)
######################################################################

# === Required ========================================================
training_job_id: <training_job_id>
val_dataset_id: <val_dataset_id>
host_results_root: <host_results_root>

# === Eval-ms endpoint ================================================
eval_host: localhost
eval_port: 32090

# === Inference settings ==============================================

# Use transformers (not vllm) for LoRA evaluations — avoids tokenizer
# compat issues with Qwen3VL + vllm when flash_attn is not installed.
# Switch to vllm for full-FT checkpoints when faster batch inference helps.
backend: transformers

# fps MUST match train_config.toml [custom.vision].fps.
fps: <fps>
temperature: 0.0
top_p: 1.0

# Pick a specific checkpoint; null = latest under training_job_id.
checkpoint_step:                # null | int

# Per-job VLM input resolution overrides.
resolution_config:              # null | {max_frames, total_pixels, ...}

# Pin to one GPU; null = all visible.
gpu_id:

# === Polling ==========================================================
poll_interval_sec: 20
timeout_sec: 3600
